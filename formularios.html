 <!-- Formulários -->
  <div id="vestuarioDoacao" class="formulario">
    <h3>Doações de Vestuário</h3>
    <form onsubmit="agradecer(event)">
      <label>Nome:</label><input type="text" required>
      <label>Telefone:</label><input type="tel" required>
      <label>Produto:</label><input type="text" required>
      <label>Quantidade:</label><input type="number" required>
      <button type="submit">Enviar</button>
    </form>
    <div class="mensagem"></div>
    <button class="voltar" onclick="voltarMenu()">Voltar ao Menu Principal</button>
  </div>
