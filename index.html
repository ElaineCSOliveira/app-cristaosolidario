<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Solidário</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="logo.jpg" alt="Logo App Solidário">
    <h1>App Solidário</h1>
  </header>

  <nav id="menu-principal">
    <button onclick="abrirSubmenu('doacoes')">Doações</button>
    <button onclick="abrirSubmenu('trocas')">Trocas</button>
  </nav>

  <!-- Submenu Doações -->
  <div id="doacoes" class="submenu">
    <h2>Doações</h2>
    <button onclick="abrirFormulario('vestuarioDoacao')">Doações de Vestuário</button>
    <button onclick="abrirFormulario('alimentosDoacao')">Doações de Alimentos</button>
    <br><button class="voltar" onclick="voltarMenu()">Voltar ao Menu Principal</button>
  </div>

  <!-- Submenu Trocas -->
  <div id="trocas" class="submenu">
    <h2>Trocas</h2>
    <button onclick="abrirFormulario('vestuarioTroca')">Trocas de Vestuário</button>
    <button onclick="abrirFormulario('alimentosTroca')">Trocas de Alimentos</button>
    <br><button class="voltar" onclick="voltarMenu()">Voltar ao Menu Principal</button>
  </div>

  <!-- Formulários -->
  <div id="vestuarioDoacao" class="formulario">
    <h3>Doações de Vestuário</h3>
    <form onsubmit="agradecer(event)">
      <label>Nome:</label><input type="text" required>
      <label>Telefone:</label><input type="tel" required>
      <label>Produto:</label><input type="text" required>
      <label>Quantidade:</label><input type="number" required>
      <button type="submit">Enviar</button>
    </form>
    <div class="mensagem"></div>
    <button class="voltar" onclick="voltarMenu()">Voltar ao Menu Principal</button>
  </div>

  <div id="alimentosDoacao" class="formulario">
    <h3>Doações de Alimentos</h3>
    <form onsubmit="agradecer(event)">
      <label>Nome:</label><input type="text" required>
      <label>Telefone:</label><input type="tel" required>
      <label>Produto:</label><input type="text" required>
      <label>Quantidade:</label><input type="number" required>
      <button type="submit">Enviar</button>
    </form>
    <div class="mensagem"></div>
    <button class="voltar" onclick="voltarMenu()">Voltar ao Menu Principal</button>
  </div>

  <div id="vestuarioTroca" class="formulario">
    <h3>Trocas de Vestuário</h3>
    <form onsubmit="agradecer(event)">
      <label>Nome:</label><input type="text" required>
      <label>Telefone:</label><input type="tel" required>
      <label>Produto:</label><input type="text" required>
      <label>Quantidade:</label><input type="number" required>
      <button type="submit">Enviar</button>
    </form>
    <div class="mensagem"></div>
    <button class="voltar" onclick="voltarMenu()">Voltar ao Menu Principal</button>
  </div>

  <div id="alimentosTroca" class="formulario">
    <h3>Trocas de Alimentos</h3>
    <form onsubmit="agradecer(event)">
      <label>Nome:</label><input type="text" required>
      <label>Telefone:</label><input type="tel" required>
      <label>Produto:</label><input type="text" required>
      <label>Quantidade:</label><input type="number" required>
      <button type="submit">Enviar</button>
    </form>
    <div class="mensagem"></div>
    <button class="voltar" onclick="voltarMenu()">Voltar ao Menu Principal</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
